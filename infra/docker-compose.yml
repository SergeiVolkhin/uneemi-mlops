# Полный стек Uneemi MLOps (уровень зрелости 2). Поднимается одной командой.
# Запуск из infra/:  docker compose --env-file .env up -d   (или make up / make.ps1 up)
# У КАЖДОГО сервиса прописан HEALTHCHECK; порядок старта - через depends_on с
# условиями service_healthy / service_completed_successfully. Все адреса внутри
# сети - по DNS-именам сервисов, host-порты вынесены в .env (в обход занятых 6379/8000).
name: uneemi

# --- Общая конфигурация Airflow (init/webserver/scheduler) ------------------
x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: infra/Dockerfile.airflow
  image: uneemi-airflow:local
  env_file: .env
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    MLFLOW_TRACKING_URI: http://mlflow:5000
    PYTHONPATH: /opt/uneemi/src:/opt/uneemi
  volumes:
    - ../dags:/opt/airflow/dags
    - ../feature_repo:/opt/airflow/feature_repo
    - ../feature_repo/data:/opt/airflow/feature_repo/data
    - ../models:/opt/uneemi/models:ro
    - ../data:/opt/uneemi/data
    - ../.runtime/airflow_logs:/opt/airflow/logs
    - ../.runtime/airflow_runs:/opt/airflow/runs
    - ../.runtime/monitoring_reports:/opt/airflow/monitoring_reports
  user: "${AIRFLOW_UID}:0"

services:
  # --- C7 backend + метаданные: Postgres (общий для Airflow и MLflow) --------
  postgres:
    image: postgres:16.6
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [uneemi_net]

  # --- C4 online-store: Redis ------------------------------------------------
  redis:
    image: redis:7.4.1
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_HOST_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks: [uneemi_net]

  # --- C7 артефакты + C4 offline: MinIO (S3) ---------------------------------
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "${MINIO_API_HOST_PORT}:9000"
      - "${MINIO_CONSOLE_HOST_PORT}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [uneemi_net]

  # Однократная инициализация бакетов (выходит после создания).
  minio-mc:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/${MLFLOW_BUCKET} &&
      mc mb -p local/${FEAST_BUCKET} &&
      echo 'buckets ready' "
    restart: "no"
    networks: [uneemi_net]

  # --- C6 Model Registry + C7 Tracking: MLflow -------------------------------
  mlflow:
    build:
      context: ..
      dockerfile: infra/Dockerfile.mlflow
    image: uneemi-mlflow:local
    env_file: .env
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${MLFLOW_DB_NAME}
      --artifacts-destination s3://${MLFLOW_BUCKET}/
      --serve-artifacts
      --host 0.0.0.0 --port 5000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-mc:
        condition: service_completed_successfully
    ports:
      - "${MLFLOW_HOST_PORT}:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks: [uneemi_net]

  # Однократный bootstrap: завести начальную Production-модель (serving станет healthy).
  model-bootstrap:
    image: uneemi-serving:local
    build:
      context: ..
      dockerfile: serving/Dockerfile
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: ["python", "/app/scripts/bootstrap_model.py"]
    depends_on:
      mlflow:
        condition: service_healthy
    restart: "no"
    networks: [uneemi_net]

  # --- C8 Serving: FastAPI ---------------------------------------------------
  serving:
    image: uneemi-serving:local
    build:
      context: ..
      dockerfile: serving/Dockerfile
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      FEAST_REPO_PATH: /app/feature_repo
    volumes:
      - ../feature_repo/data:/app/feature_repo/data
    depends_on:
      mlflow:
        condition: service_healthy
      model-bootstrap:
        condition: service_completed_successfully
    ports:
      - "${SERVING_HOST_PORT}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks: [uneemi_net]

  # --- C3 Оркестратор: Airflow (init -> webserver + scheduler) ---------------
  airflow-init:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        airflow db migrate && \
        airflow users create --role Admin --username "$${AIRFLOW_WWW_USER}" \
          --password "$${AIRFLOW_WWW_PASSWORD}" --firstname Admin --lastname User \
          --email admin@uneemi.local || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: ["airflow", "webserver"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "${AIRFLOW_WEB_HOST_PORT}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    <<: *airflow-common
    command: ["airflow", "scheduler"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $${HOSTNAME} || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s

  # --- C9 Мониторинг: Prometheus + Pushgateway + Grafana ---------------------
  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT}:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [uneemi_net]

  pushgateway:
    image: prom/pushgateway:v1.10.0
    ports:
      - "${PUSHGATEWAY_HOST_PORT}:9091"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9091/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [uneemi_net]

  grafana:
    image: grafana/grafana:11.4.0
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "${GRAFANA_HOST_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [uneemi_net]

volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
  grafanadata:

networks:
  uneemi_net:
    driver: bridge
