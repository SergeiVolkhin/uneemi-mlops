# Провайдер дашбордов: Grafana подхватывает JSON из /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: uneemi
    orgId: 1
    folder: Uneemi
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
